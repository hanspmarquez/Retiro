<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Plan de retiro personalizado · Allianz" />
    <meta name="robots" content="noindex" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&display=swap"
      rel="stylesheet"
    />
    <link rel="preload" href="../assets/call-background.png" as="image" />
    <link rel="preload" href="../assets/hans-call-photo.jpg" as="image" />
    <link rel="preload" href="../assets/call-vibration.mp3" as="audio" />
    <link rel="preload" href="../assets/call-audio-nueva-176.m4a" as="audio" />
    <link rel="preload" href="../assets/call-ended-tone.mp3" as="audio" />
    <link rel="stylesheet" href="../styles.css" />
    <title>Llamada entrante · Plan de Retiro</title>
    <style>
      /* ── Tipografía: Cormorant Garamond + DM Sans ─────── */
      :root,
      .theme-green {
        --font-sans: "DM Sans", -apple-system, BlinkMacSystemFont, sans-serif;
        --font-display: "Cormorant Garamond", Georgia, serif;
      }

      /* ── Intro-only overrides ───────────────────────── */
      body {
        margin: 0;
        overflow: hidden; /* no scroll while in call screen */
      }

      /* Hide the site-header & main that don't exist here */
      .experience-shell {
        min-height: 100svh;
      }

      /* Transition overlay that fires when navigating away */
      #exit-overlay {
        position: fixed;
        inset: 0;
        z-index: 9999;
        background: #f5fbff;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.55s cubic-bezier(0.4, 0, 0.2, 1);
      }

      #exit-overlay.is-fading {
        opacity: 1;
        pointer-events: auto;
      }

      /* ── Azul Hielo Patrimonial: matches index-azul-claro.html ── */
      .call-blue-light .experience-shell {
        --call-text: #082f49;
        --call-muted: #456178;
        --call-soft: rgba(11, 111, 179, 0.2);
        --call-gold: #075985;
        --call-green: #047857;
        --call-green-bright: #22c55e;
        --call-green-dark: #065f46;
        background:
          radial-gradient(ellipse 70% 42% at 50% 0%, rgba(56, 189, 248, 0.24), transparent 64%),
          radial-gradient(ellipse 52% 34% at 82% 80%, rgba(4, 120, 87, 0.13), transparent 62%),
          linear-gradient(135deg, #d7efff 0%, #f5fbff 58%, #ffffff 100%);
        color: var(--call-text);
      }

      .call-blue-light .call-screen {
        background: #f5fbff;
      }

      @media (min-width: 520px) {
        .call-blue-light .call-screen {
          box-shadow: 0 0 0 1px rgba(11, 111, 179, 0.16), 0 34px 90px rgba(8, 47, 73, 0.16);
        }
      }

      .call-blue-light .call-backdrop {
        opacity: 0.2;
        filter: saturate(0.72) brightness(1.12) hue-rotate(160deg);
      }

      .call-blue-light .call-shade-top {
        background: linear-gradient(180deg, rgba(245, 251, 255, 0.98), rgba(245, 251, 255, 0.4) 42%, transparent);
      }

      .call-blue-light .call-shade-bottom {
        background: linear-gradient(0deg, rgba(234, 246, 255, 0.98), rgba(245, 251, 255, 0.46) 46%, transparent);
      }

      .call-blue-light .call-vignette {
        background:
          radial-gradient(ellipse at center, rgba(255, 255, 255, 0.1) 18%, rgba(186, 230, 253, 0.24) 78%, rgba(8, 47, 73, 0.12)),
          linear-gradient(135deg, rgba(4, 120, 87, 0.08), transparent 46%);
        backdrop-filter: blur(1px);
      }

      .call-blue-light .call-brand-row {
        color: #075985;
      }

      .call-blue-light .call-brand-line {
        background: #047857;
      }

      .call-blue-light .call-corner {
        opacity: 0.9;
      }

      .call-blue-light .call-corner-tl,
      .call-blue-light .call-corner-tr,
      .call-blue-light .call-corner-bl,
      .call-blue-light .call-corner-br {
        border-color: rgba(11, 111, 179, 0.28);
      }

      .call-blue-light .ring-waves span {
        background: rgba(4, 120, 87, 0.16);
      }

      .call-blue-light .ring-waves span:nth-child(2) {
        background: rgba(4, 120, 87, 0.1);
      }

      .call-blue-light .ring-waves span:nth-child(3) {
        background: rgba(4, 120, 87, 0.06);
      }

      .call-blue-light .progress-base {
        stroke: rgba(4, 120, 87, 0.22);
      }

      .call-blue-light .progress-ring circle {
        stroke-width: 5.5;
      }

      .call-blue-light .progress-value {
        stroke: #047857;
      }

      .call-blue-light .avatar-wrap {
        background: #ffffff;
        box-shadow: 0 24px 58px rgba(8, 47, 73, 0.16), inset 0 0 0 1px rgba(11, 111, 179, 0.14);
      }

      .call-blue-light .caller-copy h1,
      .call-blue-light .question-inner h2 {
        color: #082f49;
      }

      .call-blue-light .caller-name,
      .call-blue-light .timer {
        color: #047857;
      }

      .call-blue-light .status-text {
        color: #075985;
      }

      .call-blue-light .status-incoming {
        color: #047857;
      }

      .call-blue-light .waveform span {
        background: #047857;
        box-shadow: 0 0 9px rgba(4, 120, 87, 0.42);
      }

      .call-blue-light .answer-button {
        background: radial-gradient(circle at 35% 28%, #86efac 0%, #22c55e 28%, #047857 72%, #065f46 100%);
        box-shadow:
          0 0 56px -8px rgba(4, 120, 87, 0.5),
          inset 0 2px 7px rgba(255, 255, 255, 0.36),
          inset 0 -3px 9px rgba(0, 0, 0, 0.22),
          0 15px 28px -8px rgba(8, 47, 73, 0.28);
      }

      .call-blue-light .answer-button::after {
        display: none;
      }

      .call-blue-light .answer-button svg {
        stroke: #f5fbff;
        filter: drop-shadow(0 2px 5px rgba(8, 47, 73, 0.28));
      }

      .call-blue-light .question-screen {
        background:
          linear-gradient(180deg, rgba(245, 251, 255, 0.72), rgba(234, 246, 255, 0.94)),
          rgba(245, 251, 255, 0.88);
      }

      .call-blue-light .question-inner {
        border: 1px solid rgba(11, 111, 179, 0.18);
        border-radius: 22px;
        background: rgba(255, 255, 255, 0.9);
        box-shadow: 0 24px 68px rgba(8, 47, 73, 0.14);
        padding: 32px 24px 24px;
      }

      .call-blue-light .question-kicker {
        color: #047857;
      }

      .call-blue-light .answers button {
        border: 1px solid rgba(4, 120, 87, 0.22);
        border-radius: 999px;
        background: #ecfdf5;
        color: #047857;
        box-shadow: 0 8px 20px rgba(4, 120, 87, 0.08);
      }

      .call-blue-light .answers button::before,
      .call-blue-light .answers button::after {
        display: none;
      }

      .call-blue-light .answers button:hover,
      .call-blue-light .answers button:focus-visible,
      .call-blue-light .answers button.is-selected {
        border-color: #047857;
        background: #047857;
        color: #ffffff;
      }

      .call-blue-light .call-screen[data-state="ended"] .progress-base,
      .call-blue-light .call-screen[data-state="question"] .progress-base {
        stroke: rgba(11, 111, 179, 0.24);
      }

      .call-blue-light .call-screen[data-state="ended"] .status-ended {
        color: #075985;
        text-shadow: none;
      }

      .call-blue-light .call-screen[data-state="question"] .call-content {
        filter: blur(6px) brightness(0.86);
      }

      .sound-gate {
        position: absolute;
        inset: 0;
        z-index: 7;
        display: grid;
        place-items: end center;
        padding: 28px;
        background:
          linear-gradient(180deg, rgba(245, 251, 255, 0.08), rgba(245, 251, 255, 0.82)),
          rgba(245, 251, 255, 0.12);
        opacity: 1;
        pointer-events: auto;
        transition: opacity 0.42s ease, transform 0.42s ease;
      }

      .sound-gate.is-hidden {
        opacity: 0;
        pointer-events: none;
        transform: translateY(10px);
      }

      .sound-gate button {
        border: 0;
        border-radius: 999px;
        padding: 14px 22px;
        background: #047857;
        color: #f5fbff;
        box-shadow: 0 16px 34px rgba(4, 120, 87, 0.22);
        font: 800 0.82rem/1 var(--font-sans);
        letter-spacing: 0;
      }
    </style>
  </head>
  <body class="theme-green proposal-vault proposal-cinema call-blue-light">
    <!-- Full-screen fade used when navigating to the landing page -->
    <div id="exit-overlay" aria-hidden="true"></div>

    <section class="experience-shell" id="experiencia" aria-label="Experiencia inicial">
      <div class="call-screen" data-state="incoming" aria-live="polite">
        <img class="call-backdrop" src="../assets/call-background.png" alt="" />
        <div class="call-shade call-shade-top"></div>
        <div class="call-shade call-shade-bottom"></div>
        <div class="call-vignette"></div>

        <header class="call-brand-row">
          <span class="call-brand-line"></span>
          <span>Hans P Marquez | Patrimonio y retiro</span>
        </header>

        <span class="call-corner call-corner-tl"></span>
        <span class="call-corner call-corner-tr"></span>
        <span class="call-corner call-corner-bl"></span>
        <span class="call-corner call-corner-br"></span>

        <div class="sound-gate" aria-label="Iniciar experiencia con sonido">
          <button class="sound-gate-button" type="button">Tocar para iniciar</button>
        </div>

        <div class="call-content">
          <div class="caller-stack">
            <div class="avatar-stage">
              <div class="ring-waves" aria-hidden="true">
                <span></span>
                <span></span>
                <span></span>
              </div>

              <svg class="progress-ring" viewBox="0 0 160 160" aria-hidden="true">
                <circle class="progress-base" cx="80" cy="80" r="74"></circle>
                <circle class="progress-value" cx="80" cy="80" r="74"></circle>
              </svg>

              <div class="avatar-wrap">
                <img src="../assets/hans-call-photo.jpg" alt="Hans P Marquez" />
              </div>
            </div>

            <div class="caller-copy">
              <h1>Hans P Marquez</h1>
              <p class="caller-name">Patrimonio y retiro</p>
            </div>

            <div class="status-area">
              <p class="status-text status-incoming">llamada entrante...</p>
              <div class="status-active">
                <span class="timer">00:00</span>
                <div class="waveform" aria-hidden="true"></div>
              </div>
              <p class="status-text status-ended">llamada finalizada</p>
            </div>
          </div>

          <button class="answer-button" id="answer-button" type="button" aria-label="Contestar llamada">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6A19.79 19.79 0 0 1 2.12 4.18 2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.12.92.35 1.82.7 2.69a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.39-1.27a2 2 0 0 1 2.11-.45c.87.35 1.77.58 2.69.7A2 2 0 0 1 22 16.92z"></path>
            </svg>
          </button>
        </div>

        <section class="question-screen" aria-labelledby="question-title">
          <div class="question-inner">
            <p class="question-kicker">Antes de continuar</p>
            <h2 id="question-title">¿Alguna vez has calculado cuánto dinero podrías recibir cuando llegue tu retiro?</h2>
            <div class="answers" role="group" aria-label="Opciones de respuesta">
              <button type="button" data-answer="si">Sí</button>
              <button type="button" data-answer="mas-o-menos">Más o menos</button>
              <button type="button" data-answer="nunca">Nunca lo he calculado</button>
            </div>
          </div>
        </section>

        <audio class="call-audio" src="../assets/call-audio-nueva-176.m4a" preload="auto"></audio>
        <audio class="ring-audio" src="../assets/call-vibration.mp3" preload="auto"></audio>
      </div>
    </section>

    <script>
      /* ── Minimal inline JS ─────────────────────────────────
         Only the call-experience logic; no calculator, no notes.
         Redirects to the blue landing after the question is answered.
      ─────────────────────────────────────────────────────── */

      (function () {
        "use strict";

        // Mark JS available
        document.documentElement.classList.add("js");

        const LANDING_URL = "index-azul-claro.html";
        const LANDING_TARGETS = {
          si: "#comparativa",
          "mas-o-menos": "#top",
          nunca: "#calculadora",
        };

        const screen = document.querySelector(".call-screen");
        const audio = document.querySelector(".call-audio");
        const ringAudio = document.querySelector(".ring-audio");
        const answerButton = document.querySelector("#answer-button");
        const timer = document.querySelector(".timer");
        const progress = document.querySelector(".progress-value");
        const waveform = document.querySelector(".waveform");
        const answerOptions = document.querySelectorAll(".answers button");
        const exitOverlay = document.querySelector("#exit-overlay");
        const soundGate = document.querySelector(".sound-gate");
        const soundGateButton = document.querySelector(".sound-gate-button");

        if (!screen || !audio || !answerButton || !timer || !progress || !waveform) return;
        answerButton.disabled = true;

        // ── Constants ──────────────────────────────────────
        const audioSkipSeconds = 1;
        const audioPlaybackRate = 1.1;
        const incomingRingSeconds = 20;
        const voiceAudioSrc = "../assets/call-audio-nueva-176.m4a";
        const endedToneSrc = "../assets/call-ended-tone.mp3";
        const voiceEndCutSeconds = 1;
        const endedToneSeconds = 2;
        const progressMidpointAt = 0.3;
        const progressStorageKey = "retiro_call_voice_progress_seconds";
        const ringLength = 2 * Math.PI * 74;
        let timerFrame = null;
        let vibrationLoop = null;
        let ringStopTimeout = null;
        let incomingSoundHasPlayed = false;
        let questionTimeout = null;
        let callHasFinished = false;

        // ── Ring ───────────────────────────────────────────
        progress.style.strokeDasharray = ringLength;
        progress.style.strokeDashoffset = ringLength;

        // ── Waveform bars ──────────────────────────────────
        if (!waveform.children.length) {
          for (let i = 0; i < 20; i++) {
            const bar = document.createElement("span");
            bar.style.animationDelay = `${(i % 6) * 0.07}s`;
            waveform.appendChild(bar);
          }
        }

        // ── Helpers ────────────────────────────────────────
        const formatTime = (s) => {
          const safe = Math.max(0, Math.floor(s || 0));
          return `${String(Math.floor(safe / 60)).padStart(2, "0")}:${String(safe % 60).padStart(2, "0")}`;
        };

        const getVisualProgress = (ratio) => {
          if (ratio <= progressMidpointAt) {
            return (ratio / progressMidpointAt) * 0.5;
          }

          return 0.5 + ((ratio - progressMidpointAt) / (1 - progressMidpointAt)) * 0.5;
        };

        const getSavedVoiceProgress = () => {
          try {
            const saved = Number(localStorage.getItem(progressStorageKey));
            if (!Number.isFinite(saved)) return audioSkipSeconds;
            return Math.max(audioSkipSeconds, saved);
          } catch {
            return audioSkipSeconds;
          }
        };

        const saveVoiceProgress = () => {
          if (audio.dataset.mode === "ended-tone" || screen.dataset.state !== "active") return;
          try {
            localStorage.setItem(progressStorageKey, String(Math.max(audioSkipSeconds, audio.currentTime)));
          } catch (_) {}
        };

        const clearVoiceProgress = () => {
          try {
            localStorage.removeItem(progressStorageKey);
          } catch (_) {}
        };

        const hasSavedVoiceProgress = () => getSavedVoiceProgress() > audioSkipSeconds + 0.75;

        const updateSoundGateCopy = () => {
          if (!soundGateButton) return;
          soundGateButton.textContent = hasSavedVoiceProgress() ? "Tocar para continuar" : "Tocar para iniciar";
        };

        const vibrateIncoming = () => {
          if (!("vibrate" in navigator)) return;
          navigator.vibrate([420, 120, 420]);
          vibrationLoop = setInterval(() => navigator.vibrate([420, 120, 420]), 1700);
        };

        const stopVibration = () => {
          if (vibrationLoop) clearInterval(vibrationLoop);
          vibrationLoop = null;
          if ("vibrate" in navigator) navigator.vibrate(0);
        };

        const stopIncomingSound = () => {
          if (!ringAudio) return;
          if (ringStopTimeout) clearTimeout(ringStopTimeout);
          ringStopTimeout = null;
          ringAudio.pause();
          ringAudio.currentTime = 0;
        };

        const stopEndedTone = () => {
          if (audio.dataset.mode !== "ended-tone") return;
          audio.pause();
          audio.currentTime = 0;
          audio.src = voiceAudioSrc;
          audio.load();
          audio.dataset.mode = "voice";
        };

        const resetIncomingExperience = () => {
          if (timerFrame) cancelAnimationFrame(timerFrame);
          timerFrame = null;
          if (questionTimeout) clearTimeout(questionTimeout);
          questionTimeout = null;
          stopVibration();
          stopIncomingSound();
          stopEndedTone();
          audio.pause();
          audio.src = voiceAudioSrc;
          audio.load();
          audio.dataset.mode = "voice";
          audio.playbackRate = audioPlaybackRate;
          progress.style.strokeDashoffset = ringLength;
          timer.textContent = formatTime(Math.max(0, getSavedVoiceProgress() - audioSkipSeconds) / audioPlaybackRate);
          screen.dataset.state = "incoming";
          delete screen.dataset.sound;
          answerButton.disabled = true;
          incomingSoundHasPlayed = false;
          callHasFinished = false;
          updateSoundGateCopy();
          soundGate?.classList.remove("is-hidden");
          answerOptions.forEach((option) => option.classList.remove("is-selected"));
        };

        const startIncomingSound = async () => {
          if (!ringAudio || screen.dataset.state !== "incoming" || ringStopTimeout || incomingSoundHasPlayed) return;
          ringAudio.volume = 0.78;
          ringAudio.currentTime = 0;

          try {
            await ringAudio.play();
          } catch {
            return;
          }

          incomingSoundHasPlayed = true;
          ringStopTimeout = setTimeout(stopIncomingSound, incomingRingSeconds * 1000);
        };

        const unlockIncomingExperience = () => {
          if (screen.dataset.sound === "on") return;
          screen.dataset.sound = "on";
          answerButton.disabled = false;
          soundGate?.classList.add("is-hidden");
          vibrateIncoming();
          startIncomingSound();
        };

        const playEndedToneBeforeQuestion = async () => {
          audio.pause();
          audio.dataset.mode = "ended-tone";
          audio.src = endedToneSrc;
          audio.playbackRate = 1;
          audio.currentTime = 0;

          try {
            await audio.play();
          } catch {
            questionTimeout = setTimeout(showQuestion, endedToneSeconds * 1000);
            return;
          }

          questionTimeout = setTimeout(() => {
            stopEndedTone();
            showQuestion();
          }, endedToneSeconds * 1000);
        };

        const updateProgress = () => {
          const sourceDuration =
            Number.isFinite(audio.duration) && audio.duration > audioSkipSeconds
              ? Math.max(1, audio.duration - audioSkipSeconds - voiceEndCutSeconds)
              : 53;
          const elapsed = Math.max(0, audio.currentTime - audioSkipSeconds);
          const ratio = Math.min(elapsed / sourceDuration, 1);
          const visualRatio = getVisualProgress(ratio);
          timer.textContent = formatTime(elapsed / audioPlaybackRate);
          progress.style.strokeDashoffset = ringLength * (1 - visualRatio);
          saveVoiceProgress();

          if (Number.isFinite(audio.duration) && audio.currentTime >= audio.duration - voiceEndCutSeconds) {
            finishCall();
            return;
          }

          if (screen.dataset.state === "active") {
            timerFrame = requestAnimationFrame(updateProgress);
          }
        };

        const showQuestion = () => {
          screen.dataset.state = "question";
        };

        const finishCall = () => {
          if (callHasFinished) return;
          callHasFinished = true;
          if (timerFrame) cancelAnimationFrame(timerFrame);
          timerFrame = null;
          stopVibration();
          stopIncomingSound();
          audio.pause();
          clearVoiceProgress();
          progress.style.strokeDashoffset = 0;
          screen.dataset.state = "ended";
          playEndedToneBeforeQuestion();
        };

        const answerCall = async () => {
          if (screen.dataset.state !== "incoming") return;
          stopVibration();
          stopIncomingSound();
          screen.dataset.state = "active";
          if (audio.dataset.mode !== "voice") {
            audio.src = voiceAudioSrc;
            audio.load();
            audio.dataset.mode = "voice";
          }
          audio.playbackRate = audioPlaybackRate;
          try {
            const resumeTime = getSavedVoiceProgress();
            const latestSafeTime =
              Number.isFinite(audio.duration) && audio.duration > voiceEndCutSeconds
                ? Math.max(audioSkipSeconds, audio.duration - voiceEndCutSeconds - 0.5)
                : resumeTime;
            audio.currentTime = Math.min(resumeTime, latestSafeTime);
            await audio.play();
          } catch {
            finishCall();
            return;
          }
          updateProgress();
        };

        // ── Navigate to landing ────────────────────────────
        const goToLanding = (answer) => {
          try {
            localStorage.setItem("retiro_calculo_respuesta", answer || "");
          } catch (_) {}

          // Fade out then redirect
          exitOverlay.classList.add("is-fading");
          setTimeout(() => {
            window.location.href = `${LANDING_URL}${LANDING_TARGETS[answer] || "#top"}`;
          }, 580);
        };

        // ── Events ─────────────────────────────────────────
        soundGateButton?.addEventListener("click", unlockIncomingExperience);
        answerButton.addEventListener("click", answerCall);
        audio.addEventListener("ended", finishCall);
        audio.addEventListener("loadedmetadata", () => {
          if (screen.dataset.state === "incoming") {
            timer.textContent = formatTime(Math.max(0, getSavedVoiceProgress() - audioSkipSeconds) / audioPlaybackRate);
          }
        });

        answerOptions.forEach((btn) => {
          btn.addEventListener("click", () => {
            answerOptions.forEach((o) => o.classList.remove("is-selected"));
            btn.classList.add("is-selected");
            clearVoiceProgress();
            // Give a moment for the selection animation, then redirect
            setTimeout(() => goToLanding(btn.dataset.answer), 480);
          });
        });

        const handlePageInterruption = () => {
          if (screen.dataset.state === "question") return;
          saveVoiceProgress();
          resetIncomingExperience();
        };

        document.addEventListener("visibilitychange", () => {
          if (document.visibilityState === "hidden") {
            handlePageInterruption();
          }
        });

        window.addEventListener("pagehide", handlePageInterruption);
        window.addEventListener("blur", () => {
          if (screen.dataset.state === "active" || screen.dataset.state === "ended") {
            handlePageInterruption();
          }
        });

        window.addEventListener("pageshow", (event) => {
          if (event.persisted && screen.dataset.state !== "question") {
            resetIncomingExperience();
          }
        });

        window.addEventListener("beforeunload", () => {
          saveVoiceProgress();
          stopVibration();
          stopIncomingSound();
          stopEndedTone();
          if (timerFrame) cancelAnimationFrame(timerFrame);
          if (questionTimeout) clearTimeout(questionTimeout);
        });

        // ── Start ──────────────────────────────────────────
        updateSoundGateCopy();
        timer.textContent = formatTime(Math.max(0, getSavedVoiceProgress() - audioSkipSeconds) / audioPlaybackRate);
        document.addEventListener("keydown", unlockIncomingExperience, { once: true });
      })();
    </script>
  </body>
</html>
